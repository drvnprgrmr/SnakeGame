<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: #ffffff;
        }
    </style>
    <title>SnakeGame Captive Portal</title>
</head>

<body>
    <h1>SnakeGame Captive Portal</h1>
    <p>Use this to configure the network to be connected to on restart</p>

    <div>
        <form action="/" method="post" id="form">
            <div>
                <span>SSID: </span>
                <input type="text" name="ssid" id="ssid">
            </div>

            <div>
                <span>Password</span>
                <input type="password" name="password" id="password">
            </div>

            <input type="hidden" name="ctx" value="captive">
            <button type="submit">Save and restart</button>

        </form>
    </div>
</body>

<script>
    const form = document.getElementById("form");
    form && form.addEventListener("submit", (ev) => {
        ev.preventDefault();

        const formData = new FormData(event.target);

        const obj = Object.fromEntries(formData.entries());

        const data = JSON.stringify(obj);

        fetch("http://192.168.4.1/", {
            method: "POST",
            body: data,
        }).then((resp) => {
            if (resp.ok) {
                alert("Form submitted!");
            } else {
                console.error(resp.status, resp.statusText);
                throw new Error("Error submitting form!")
            }
        })
    });
</script>

</html>
